name: Backend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-build-deploy:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22]

    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      PORT: ${{ secrets.PORT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Stop PM2 services (if running)
        run: |
          pm2 stop all || echo "No PM2 processes to stop"

      # ---------- BACKEND ----------
      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          npm ci

      - name: Run backend tests
        working-directory: ./backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ secrets.PORT }}
        run: |
          npm test

      # ---------- FRONTEND ----------
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm run build

      # ---------- ENV FOR PRODUCTION ----------
      - name: Create .env for backend (production)
        working-directory: ./backend
        run: |
          rm -f .env
          echo "${{ secrets.PROD }}" > .env

      # ---------- RESTART SERVICES ----------
      - name: Start PM2 services
        run: |
          pm2 start all || pm2 start ecosystem.config.js || echo "Start your app with pm2 manually first time"

      - name: Restart PM2 services
        run: |
          pm2 restart all
